<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="/assets/logo.png" type="image/png">
  <link rel="apple-touch-icon" href="/assets/logo.png">
  <title>Checkout | Riot Shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Questrial&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { colors: { 'riot-dark': '#0a0608', 'riot-red': '#ff4655', 'riot-bg': '#0a0608' } } } };</script>
  <link rel="stylesheet" href="css/custom.css">
</head>
<body data-page="payment">

  <div class="site-bg" aria-hidden="true">
    <div class="site-bg-glow">
      <div class="glow-orb glow-orb-1"></div>
      <div class="glow-orb glow-orb-2"></div>
      <div class="glow-orb glow-orb-3"></div>
    </div>
    <div class="site-bg-grid"></div>
    <div class="site-bg-dots"></div>
    <div class="site-bg-grain"></div>
    <div class="site-bg-vignette"></div>
    <div class="site-bg-bottom-fade"></div>
  </div>

  <div id="site-header"></div>

  <main class="site-main">
    <section class="hero-section page-hero page-enter">
      <div class="hero-inner">
        <div class="glass-pill page-hero-pill">
          <span class="live-dot" aria-hidden="true"></span>
          <span>Secure Checkout — Riot Shop</span>
        </div>
        <h1 class="hero-title">Secure <span class="brand-text">Checkout</span></h1>
        <p class="hero-subtitle">Complete your purchase in three quick steps. Delivery is instant after payment confirmation.</p>
      </div>
    </section>

    <section class="section-block" style="padding-top: 0;">
      <div class="max-w-xl mx-auto px-4 sm:px-6" id="payment-root"></div>
    </section>
  </main>

  <div id="site-footer"></div>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="js/data.js"></script>
  <script src="js/payment-data.js"></script>
  <script src="js/shared.js"></script>
  <script src="js/payment.js"></script>
</body>
</html>
